<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angry Words — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .header {
    padding: 32px 24px 20px;
    text-align: center;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #141420;
    border: 1px solid #1e1e2e;
    cursor: crosshair;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(108, 138, 255, 0.05);
    transition: box-shadow 0.3s;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(108, 138, 255, 0.1);
  }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #6c8aff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  a.back:hover { opacity: 1; }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  button {
    padding: 8px 18px;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    background: #141420;
    color: #e8e6e3;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  button:hover {
    border-color: #6c8aff;
    transform: translateY(-1px);
  }
  .score {
    font-size: 15px;
    color: #feca57;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 8px;
    background: rgba(254, 202, 87, 0.08);
    border: 1px solid rgba(254, 202, 87, 0.15);
  }
</style>
</head>
<body>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Angry Words</h1>
  <p class="hint">Drag to aim the slingshot, release to launch word-projectiles at the letter tower.</p>
</div>
<canvas id="canvas"></canvas>
<div class="controls">
  <button id="btn-reset">Reset</button>
  <span class="score" id="score">Score: 0</span>
</div>
<script type="module" src="./angry.ts"></script>
</body>
</html>
