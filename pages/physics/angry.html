<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angry Words — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Vignette overlay */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.7) 100%);
  }

  /* Fiery glow from below */
  .fire-glow {
    position: fixed;
    bottom: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 120%;
    height: 350px;
    background: radial-gradient(ellipse at center bottom, rgba(255, 56, 56, 0.15) 0%, rgba(254, 202, 87, 0.08) 30%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: fireGlowPulse 4s ease-in-out infinite;
  }
  @keyframes fireGlowPulse {
    0%, 100% { opacity: 0.7; transform: translateX(-50%) scaleY(1); }
    50% { opacity: 1; transform: translateX(-50%) scaleY(1.1); }
  }

  /* Rising smoke/ash particles */
  .smoke-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .smoke-particle {
    position: absolute;
    bottom: -20px;
    width: 3px;
    height: 3px;
    background: rgba(200, 180, 160, 0.3);
    border-radius: 50%;
    animation: smokeRise linear infinite;
  }
  .smoke-particle:nth-child(1) { left: 10%; animation-duration: 8s; animation-delay: 0s; width: 2px; height: 2px; }
  .smoke-particle:nth-child(2) { left: 20%; animation-duration: 10s; animation-delay: 1s; width: 4px; height: 4px; opacity: 0.4; }
  .smoke-particle:nth-child(3) { left: 35%; animation-duration: 7s; animation-delay: 2s; }
  .smoke-particle:nth-child(4) { left: 50%; animation-duration: 9s; animation-delay: 0.5s; width: 2px; height: 2px; }
  .smoke-particle:nth-child(5) { left: 65%; animation-duration: 11s; animation-delay: 3s; width: 4px; height: 4px; }
  .smoke-particle:nth-child(6) { left: 75%; animation-duration: 8s; animation-delay: 1.5s; }
  .smoke-particle:nth-child(7) { left: 85%; animation-duration: 10s; animation-delay: 4s; width: 2px; height: 2px; }
  .smoke-particle:nth-child(8) { left: 45%; animation-duration: 12s; animation-delay: 2.5s; width: 3px; height: 3px; }
  @keyframes smokeRise {
    0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.4; }
    25% { transform: translateY(-25vh) translateX(10px) scale(1.2); opacity: 0.3; }
    50% { transform: translateY(-50vh) translateX(-5px) scale(1.5); opacity: 0.2; }
    75% { transform: translateY(-75vh) translateX(8px) scale(1.8); opacity: 0.1; }
    100% { transform: translateY(-105vh) translateX(-3px) scale(2); opacity: 0; }
  }

  /* Rubble squares drifting */
  .rubble-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .rubble {
    position: absolute;
    bottom: -10px;
    background: rgba(255, 100, 50, 0.2);
    animation: rubbleDrift linear infinite;
  }
  .rubble:nth-child(1) { left: 15%; width: 4px; height: 4px; animation-duration: 14s; animation-delay: 0s; transform: rotate(20deg); }
  .rubble:nth-child(2) { left: 30%; width: 6px; height: 5px; animation-duration: 16s; animation-delay: 2s; background: rgba(254, 202, 87, 0.15); }
  .rubble:nth-child(3) { left: 55%; width: 3px; height: 3px; animation-duration: 12s; animation-delay: 1s; }
  .rubble:nth-child(4) { left: 70%; width: 5px; height: 4px; animation-duration: 18s; animation-delay: 3s; background: rgba(255, 150, 50, 0.18); }
  .rubble:nth-child(5) { left: 82%; width: 4px; height: 5px; animation-duration: 15s; animation-delay: 5s; }
  .rubble:nth-child(6) { left: 40%; width: 3px; height: 4px; animation-duration: 13s; animation-delay: 4s; background: rgba(200, 100, 50, 0.2); }
  @keyframes rubbleDrift {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
    50% { transform: translateY(-40vh) rotate(180deg); opacity: 0.3; }
    100% { transform: translateY(-90vh) rotate(360deg); opacity: 0; }
  }

  .header {
    padding: 32px 24px 20px;
    text-align: center;
    position: relative;
    z-index: 10;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #feca57 0%, #ff9f43 40%, #ff3838 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    animation: titleGlow 3s ease-in-out infinite;
  }
  @keyframes titleGlow {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #141420;
    border: 1px solid #1e1e2e;
    cursor: crosshair;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(108, 138, 255, 0.05);
    transition: box-shadow 0.3s;
    position: relative;
    z-index: 10;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(108, 138, 255, 0.1);
  }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #ff9f43;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s;
    z-index: 200;
  }
  a.back:hover { opacity: 1; }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    position: relative;
    z-index: 10;
  }
  button {
    padding: 8px 18px;
    border: 1px solid #2a1a1a;
    border-radius: 10px;
    background: #1a1014;
    color: #e8e6e3;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  button:hover {
    border-color: #ff6b3a;
    background: #201418;
    transform: translateY(-1px);
  }
  .score {
    font-size: 15px;
    color: #feca57;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 8px;
    background: rgba(254, 202, 87, 0.1);
    border: 1px solid rgba(254, 202, 87, 0.25);
    box-shadow: 0 0 20px rgba(254, 202, 87, 0.1), inset 0 0 10px rgba(254, 202, 87, 0.05);
    animation: scorePulse 2s ease-in-out infinite;
  }
  @keyframes scorePulse {
    0%, 100% { box-shadow: 0 0 20px rgba(254, 202, 87, 0.1), inset 0 0 10px rgba(254, 202, 87, 0.05); }
    50% { box-shadow: 0 0 30px rgba(254, 202, 87, 0.2), inset 0 0 15px rgba(254, 202, 87, 0.08); }
  }
</style>
</head>
<body>
<div class="vignette"></div>
<div class="fire-glow"></div>
<div class="smoke-container">
  <div class="smoke-particle"></div>
  <div class="smoke-particle"></div>
  <div class="smoke-particle"></div>
  <div class="smoke-particle"></div>
  <div class="smoke-particle"></div>
  <div class="smoke-particle"></div>
  <div class="smoke-particle"></div>
  <div class="smoke-particle"></div>
</div>
<div class="rubble-container">
  <div class="rubble"></div>
  <div class="rubble"></div>
  <div class="rubble"></div>
  <div class="rubble"></div>
  <div class="rubble"></div>
  <div class="rubble"></div>
</div>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Angry Words</h1>
  <p class="hint">Drag to aim the slingshot, release to launch word-projectiles at the letter tower.</p>
</div>
<canvas id="canvas"></canvas>
<div class="controls">
  <button id="btn-reset">Reset</button>
  <span class="score" id="score">Score: 0</span>
</div>
<script type="module" src="./angry.ts"></script>
</body>
</html>
