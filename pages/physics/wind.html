<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wind — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Vignette overlay */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
  }

  /* Cool breeze glow from left */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 40% 70% at 0% 50%, rgba(135,206,235,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 10% 40%, rgba(135,206,235,0.05) 0%, transparent 60%);
  }

  /* Flowing horizontal wind streaks */
  .bg-streaks {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .streak {
    position: absolute;
    height: 1px;
    border-radius: 1px;
    background: linear-gradient(to right, transparent, rgba(135,206,235,0.15), transparent);
    animation: wind-streak linear infinite;
  }
  .streak:nth-child(1) { top: 20%; width: 120px; animation-duration: 8s; animation-delay: 0s; }
  .streak:nth-child(2) { top: 35%; width: 180px; animation-duration: 6s; animation-delay: -2s; opacity: 0.7; }
  .streak:nth-child(3) { top: 50%; width: 90px; animation-duration: 10s; animation-delay: -4s; opacity: 0.5; }
  .streak:nth-child(4) { top: 65%; width: 150px; animation-duration: 7s; animation-delay: -1s; }
  .streak:nth-child(5) { top: 80%; width: 200px; animation-duration: 9s; animation-delay: -5s; opacity: 0.6; }
  .streak:nth-child(6) { top: 25%; width: 100px; animation-duration: 11s; animation-delay: -7s; opacity: 0.4; }
  .streak:nth-child(7) { top: 70%; width: 140px; animation-duration: 7.5s; animation-delay: -3s; opacity: 0.5; }

  @keyframes wind-streak {
    0% { left: -200px; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { left: 110%; opacity: 0; }
  }

  /* Wispy cloud shapes */
  .wisps {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .wisp {
    position: absolute;
    border-radius: 50%;
    background: rgba(135,206,235,0.03);
    filter: blur(20px);
    animation: drift-wisp linear infinite;
  }
  .wisp:nth-child(1) { width: 200px; height: 60px; top: 15%; animation-duration: 30s; animation-delay: 0s; }
  .wisp:nth-child(2) { width: 150px; height: 40px; top: 45%; animation-duration: 25s; animation-delay: -10s; opacity: 0.7; }
  .wisp:nth-child(3) { width: 250px; height: 50px; top: 70%; animation-duration: 35s; animation-delay: -5s; opacity: 0.5; }

  @keyframes drift-wisp {
    0% { left: -300px; }
    100% { left: 110%; }
  }

  .header {
    padding: 32px 24px 20px;
    text-align: center;
    position: relative;
    z-index: 2;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #ffffff, #a8d8ea, #87ceeb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #141420;
    border: 1px solid rgba(135,206,235,0.1);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(135,206,235,0.04);
    position: relative;
    z-index: 2;
  }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #87ceeb;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s, transform 0.2s, letter-spacing 0.2s;
    z-index: 20;
  }
  a.back:hover {
    opacity: 1;
    transform: translateX(-3px);
    letter-spacing: 0.02em;
  }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    position: relative;
    z-index: 2;
  }
  button {
    padding: 8px 18px;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    background: #141420;
    color: #e8e6e3;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  button:hover {
    border-color: #87ceeb;
    transform: translateY(-1px);
  }
  button.active {
    border-color: #87ceeb;
    background: rgba(135,206,235,0.1);
    color: #87ceeb;
  }
</style>
</head>
<body>
<div class="vignette"></div>
<div class="bg-glow"></div>
<div class="bg-streaks">
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
  <div class="streak"></div>
</div>
<div class="wisps">
  <div class="wisp"></div>
  <div class="wisp"></div>
  <div class="wisp"></div>
</div>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Wind</h1>
  <p class="hint">Letters sway in the wind, tethered by springs to their reading positions.</p>
</div>
<canvas id="canvas"></canvas>
<div class="controls">
  <button id="btn-calm">Calm</button>
  <button id="btn-breeze" class="active">Breeze</button>
  <button id="btn-gale">Gale</button>
  <button id="btn-storm">Storm</button>
</div>
<script type="module" src="./wind.ts"></script>
</body>
</html>
