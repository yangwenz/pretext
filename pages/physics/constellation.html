<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #030308;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  .header {
    padding: 32px 24px 20px;
    text-align: center;
    position: relative;
    z-index: 2;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e8e6e3 0%, #b8c6ff 50%, #6c8aff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #020206;
    border: 1px solid #12122a;
    cursor: crosshair;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 80px rgba(108, 138, 255, 0.06);
    transition: box-shadow 0.3s;
    position: relative;
    z-index: 2;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 80px rgba(108, 138, 255, 0.12);
  }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #6c8aff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s;
    z-index: 10;
  }
  a.back:hover { opacity: 1; }

  /* Deep space vignette */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,0.9) 100%);
  }

  /* Starfield background */
  .starfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(1px 1px at 5% 15%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 12% 42%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 18% 78%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 25% 30%, rgba(200,210,255,0.5), transparent),
      radial-gradient(1px 1px at 32% 65%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 38% 10%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 45% 85%, rgba(200,220,255,0.5), transparent),
      radial-gradient(1px 1px at 52% 25%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 58% 55%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 65% 38%, rgba(200,210,255,0.5), transparent),
      radial-gradient(1px 1px at 72% 72%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 78% 15%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 85% 48%, rgba(200,220,255,0.3), transparent),
      radial-gradient(1px 1px at 92% 80%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 7% 90%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 48% 5%, rgba(200,210,255,0.4), transparent),
      radial-gradient(1px 1px at 67% 92%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 88% 22%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 22% 58%, rgba(200,220,255,0.3), transparent),
      radial-gradient(1px 1px at 95% 60%, rgba(255,255,255,0.4), transparent);
  }

  /* Nebula glow patches */
  .nebula {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    filter: blur(60px);
    opacity: 0.4;
    animation: nebula-drift 20s ease-in-out infinite alternate;
  }
  .nebula-1 {
    top: 20%;
    left: 15%;
    width: 300px;
    height: 200px;
    background: rgba(108,138,255,0.08);
  }
  .nebula-2 {
    top: 60%;
    right: 10%;
    width: 250px;
    height: 250px;
    background: rgba(100,150,255,0.06);
    animation-delay: -7s;
  }
  .nebula-3 {
    bottom: 15%;
    left: 30%;
    width: 200px;
    height: 150px;
    background: rgba(180,160,255,0.05);
    animation-delay: -14s;
  }
  @keyframes nebula-drift {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(20px, -15px) scale(1.1); }
  }

  /* Orbital ring lines */
  .orbital-ring {
    position: fixed;
    top: 50%;
    left: 50%;
    border-radius: 50%;
    border: 1px solid rgba(108,138,255,0.04);
    pointer-events: none;
    z-index: 0;
    transform: translate(-50%, -50%);
  }
  .orbital-ring:nth-child(1) { width: 200px; height: 200px; }
  .orbital-ring:nth-child(2) { width: 320px; height: 320px; }
  .orbital-ring:nth-child(3) { width: 460px; height: 460px; }
  .orbital-ring:nth-child(4) { width: 620px; height: 620px; }

  /* Twinkling stars */
  .twinkle-star {
    position: fixed;
    width: 3px;
    height: 3px;
    background: #b8c6ff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: twinkle 3s ease-in-out infinite;
  }
  .twinkle-star:nth-child(1) { top: 8%; left: 30%; animation-delay: 0s; }
  .twinkle-star:nth-child(2) { top: 25%; left: 80%; animation-delay: 0.7s; }
  .twinkle-star:nth-child(3) { top: 45%; left: 5%; animation-delay: 1.4s; }
  .twinkle-star:nth-child(4) { top: 70%; left: 60%; animation-delay: 2.1s; }
  .twinkle-star:nth-child(5) { top: 90%; left: 40%; animation-delay: 2.8s; }
  .twinkle-star:nth-child(6) { top: 55%; left: 92%; animation-delay: 0.3s; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 0.9; transform: scale(1.2); }
  }
</style>
</head>
<body>
<div class="starfield"></div>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>
<div class="orbital-ring"></div>
<div class="orbital-ring"></div>
<div class="orbital-ring"></div>
<div class="orbital-ring"></div>
<div class="twinkle-star"></div>
<div class="twinkle-star"></div>
<div class="twinkle-star"></div>
<div class="twinkle-star"></div>
<div class="twinkle-star"></div>
<div class="twinkle-star"></div>
<div class="vignette"></div>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Solar System</h1>
  <p class="hint">Eight planets orbit the Sun. Text reflows around them in real time. Drag any planet to disturb its orbit.</p>
</div>
<canvas id="canvas"></canvas>
<script type="module" src="./constellation.ts"></script>
</body>
</html>
