<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reflow — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #0f0f13;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .header { padding: 24px; text-align: center; }
  h1 { font-size: 24px; font-weight: 600; }
  .hint { color: #8a8690; font-size: 14px; margin-top: 6px; }
  canvas {
    display: block;
    border-radius: 12px;
    background: #1a1a22;
    cursor: pointer;
  }
  a.back {
    position: fixed;
    top: 16px;
    left: 16px;
    color: #6c8aff;
    text-decoration: none;
    font-size: 14px;
  }
  .controls {
    margin-top: 16px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  button {
    padding: 8px 16px;
    border: 1px solid #2a2a35;
    border-radius: 8px;
    background: #1a1a22;
    color: #e8e6e3;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  button:hover { border-color: #6c8aff; }
  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #8a8690;
    font-size: 13px;
  }
  input[type=range] {
    width: 160px;
    accent-color: #6c8aff;
  }
  .mode-label {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    background: rgba(108, 138, 255, 0.12);
    color: #6c8aff;
  }
</style>
</head>
<body>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Live Reflow</h1>
  <p class="hint">Pretext lays out the paragraph. Drag the width slider to reflow. Click to shatter into physics, click again to reassemble.</p>
</div>
<canvas id="canvas"></canvas>
<div class="controls">
  <div class="slider-wrap">
    <span>Width:</span>
    <input type="range" id="width-slider" min="200" max="800" value="500">
    <span id="width-label">500px</span>
  </div>
  <button id="btn-toggle">Shatter</button>
  <span class="mode-label" id="mode-label">Layout mode</span>
</div>
<script type="module" src="./reflow.ts"></script>
</body>
</html>
