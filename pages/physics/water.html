<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #030810;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Vignette overlay */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(2, 8, 20, 0.8) 100%);
  }

  /* Deep oceanic glow */
  .ocean-glow {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 140%;
    height: 140%;
    background: radial-gradient(ellipse at center, rgba(13, 71, 161, 0.08) 0%, rgba(2, 136, 209, 0.04) 30%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    animation: oceanGlowPulse 6s ease-in-out infinite;
  }
  @keyframes oceanGlowPulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
  }

  /* Caustic light patterns */
  .caustics {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .caustic-circle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(79, 195, 247, 0.06) 0%, transparent 70%);
    animation: causticFloat ease-in-out infinite;
  }
  .caustic-circle:nth-child(1) { width: 300px; height: 300px; top: 10%; left: 20%; animation-duration: 8s; }
  .caustic-circle:nth-child(2) { width: 400px; height: 400px; top: 30%; left: 60%; animation-duration: 10s; animation-delay: 1s; }
  .caustic-circle:nth-child(3) { width: 250px; height: 250px; top: 60%; left: 10%; animation-duration: 7s; animation-delay: 2s; }
  .caustic-circle:nth-child(4) { width: 350px; height: 350px; top: 50%; left: 50%; animation-duration: 9s; animation-delay: 3s; }
  .caustic-circle:nth-child(5) { width: 200px; height: 200px; top: 20%; left: 75%; animation-duration: 11s; animation-delay: 0.5s; }
  @keyframes causticFloat {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
    25% { transform: translate(20px, -15px) scale(1.1); opacity: 0.8; }
    50% { transform: translate(-10px, 10px) scale(0.95); opacity: 0.6; }
    75% { transform: translate(15px, 5px) scale(1.05); opacity: 0.7; }
  }

  /* Rising bubbles */
  .bubbles-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .bubble {
    position: absolute;
    bottom: -20px;
    border-radius: 50%;
    border: 1px solid rgba(79, 195, 247, 0.2);
    background: rgba(79, 195, 247, 0.03);
    animation: bubbleRise linear infinite;
  }
  .bubble:nth-child(1) { left: 12%; width: 8px; height: 8px; animation-duration: 10s; animation-delay: 0s; }
  .bubble:nth-child(2) { left: 25%; width: 5px; height: 5px; animation-duration: 12s; animation-delay: 2s; }
  .bubble:nth-child(3) { left: 40%; width: 10px; height: 10px; animation-duration: 9s; animation-delay: 1s; }
  .bubble:nth-child(4) { left: 55%; width: 6px; height: 6px; animation-duration: 14s; animation-delay: 3s; }
  .bubble:nth-child(5) { left: 68%; width: 7px; height: 7px; animation-duration: 11s; animation-delay: 0.5s; }
  .bubble:nth-child(6) { left: 80%; width: 4px; height: 4px; animation-duration: 13s; animation-delay: 4s; }
  .bubble:nth-child(7) { left: 90%; width: 9px; height: 9px; animation-duration: 10s; animation-delay: 2.5s; }
  .bubble:nth-child(8) { left: 35%; width: 5px; height: 5px; animation-duration: 15s; animation-delay: 5s; }
  @keyframes bubbleRise {
    0% { transform: translateY(0) translateX(0); opacity: 0.6; }
    25% { transform: translateY(-25vh) translateX(5px); opacity: 0.5; }
    50% { transform: translateY(-50vh) translateX(-3px); opacity: 0.4; }
    75% { transform: translateY(-75vh) translateX(4px); opacity: 0.2; }
    100% { transform: translateY(-105vh) translateX(-2px); opacity: 0; }
  }

  /* Wave at bottom */
  .wave-container {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 80px;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }
  .wave {
    position: absolute;
    bottom: -10px;
    left: -5%;
    width: 110%;
    height: 60px;
    background: rgba(2, 136, 209, 0.04);
    border-radius: 50% 50% 0 0;
    animation: waveUndulate 5s ease-in-out infinite;
  }
  .wave:nth-child(2) {
    height: 40px;
    bottom: -5px;
    background: rgba(13, 71, 161, 0.06);
    animation-duration: 7s;
    animation-delay: 0.5s;
  }
  .wave:nth-child(3) {
    height: 50px;
    bottom: -8px;
    background: rgba(79, 195, 247, 0.03);
    animation-duration: 6s;
    animation-delay: 1s;
  }
  @keyframes waveUndulate {
    0%, 100% { transform: translateX(0) scaleY(1); }
    25% { transform: translateX(10px) scaleY(1.2); }
    50% { transform: translateX(-5px) scaleY(0.8); }
    75% { transform: translateX(8px) scaleY(1.1); }
  }

  .header {
    padding: 32px 24px 20px;
    text-align: center;
    position: relative;
    z-index: 10;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e8e6e3 0%, #4fc3f7 50%, #0288d1 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #050d1a;
    border: 1px solid #0d2040;
    cursor: pointer;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 80px rgba(13, 71, 161, 0.1);
    transition: box-shadow 0.3s;
    position: relative;
    z-index: 10;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 80px rgba(13, 71, 161, 0.2);
  }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #4fc3f7;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s;
    z-index: 200;
  }
  a.back:hover { opacity: 1; }
</style>
</head>
<body>
<div class="vignette"></div>
<div class="ocean-glow"></div>
<div class="caustics">
  <div class="caustic-circle"></div>
  <div class="caustic-circle"></div>
  <div class="caustic-circle"></div>
  <div class="caustic-circle"></div>
  <div class="caustic-circle"></div>
</div>
<div class="bubbles-container">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
</div>
<div class="wave-container">
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
</div>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Water</h1>
  <p class="hint">A river cuts through the text. Words flow into two columns around it. Click or drag the water.</p>
</div>
<canvas id="canvas"></canvas>
<script type="module" src="./water.ts"></script>
</body>
</html>
