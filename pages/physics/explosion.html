<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shatter — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #0f0f13;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .header { padding: 24px; text-align: center; }
  h1 { font-size: 24px; font-weight: 600; }
  .hint { color: #8a8690; font-size: 14px; margin-top: 6px; }
  canvas {
    display: block;
    border-radius: 12px;
    background: #1a1a22;
    cursor: crosshair;
  }
  a.back {
    position: fixed;
    top: 16px;
    left: 16px;
    color: #6c8aff;
    text-decoration: none;
    font-size: 14px;
  }
</style>
</head>
<body>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Shatter</h1>
  <p class="hint">Click to explode. Click again to reassemble.</p>
</div>
<canvas id="canvas"></canvas>
<script type="module" src="./explosion.ts"></script>
</body>
</html>
