<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinball — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #080810;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Vignette overlay */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(8, 8, 16, 0.85) 100%);
  }

  /* Retro scanlines */
  .scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    opacity: 0.6;
  }

  /* Neon glow spots */
  .neon-glows {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .neon-spot {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    animation: neonPulse ease-in-out infinite;
  }
  .neon-spot:nth-child(1) {
    width: 200px; height: 200px;
    top: 15%; left: 10%;
    background: rgba(84, 160, 255, 0.08);
    animation-duration: 4s;
  }
  .neon-spot:nth-child(2) {
    width: 250px; height: 250px;
    top: 60%; right: 10%;
    background: rgba(255, 107, 107, 0.06);
    animation-duration: 5s;
    animation-delay: 1s;
  }
  .neon-spot:nth-child(3) {
    width: 180px; height: 180px;
    top: 40%; left: 60%;
    background: rgba(72, 219, 251, 0.07);
    animation-duration: 6s;
    animation-delay: 2s;
  }
  .neon-spot:nth-child(4) {
    width: 220px; height: 220px;
    bottom: 20%; left: 30%;
    background: rgba(165, 94, 234, 0.06);
    animation-duration: 4.5s;
    animation-delay: 0.5s;
  }
  .neon-spot:nth-child(5) {
    width: 160px; height: 160px;
    top: 10%; right: 25%;
    background: rgba(255, 159, 67, 0.05);
    animation-duration: 5.5s;
    animation-delay: 3s;
  }
  @keyframes neonPulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  /* Floating neon dot particles */
  .neon-particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .neon-dot {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    animation: neonDotFloat linear infinite;
  }
  .neon-dot:nth-child(1) { left: 10%; top: 80%; background: #54a0ff; box-shadow: 0 0 6px #54a0ff; animation-duration: 12s; }
  .neon-dot:nth-child(2) { left: 25%; top: 90%; background: #ff6b6b; box-shadow: 0 0 6px #ff6b6b; animation-duration: 10s; animation-delay: 1s; }
  .neon-dot:nth-child(3) { left: 40%; top: 85%; background: #48dbfb; box-shadow: 0 0 6px #48dbfb; animation-duration: 14s; animation-delay: 2s; }
  .neon-dot:nth-child(4) { left: 60%; top: 95%; background: #a55eea; box-shadow: 0 0 6px #a55eea; animation-duration: 11s; animation-delay: 0.5s; width: 2px; height: 2px; }
  .neon-dot:nth-child(5) { left: 75%; top: 88%; background: #ff9f43; box-shadow: 0 0 6px #ff9f43; animation-duration: 13s; animation-delay: 3s; }
  .neon-dot:nth-child(6) { left: 88%; top: 82%; background: #54a0ff; box-shadow: 0 0 6px #54a0ff; animation-duration: 9s; animation-delay: 4s; width: 2px; height: 2px; }
  .neon-dot:nth-child(7) { left: 50%; top: 92%; background: #ff6b6b; box-shadow: 0 0 6px #ff6b6b; animation-duration: 15s; animation-delay: 1.5s; }
  .neon-dot:nth-child(8) { left: 33%; top: 78%; background: #48dbfb; box-shadow: 0 0 6px #48dbfb; animation-duration: 11s; animation-delay: 5s; width: 4px; height: 4px; }
  @keyframes neonDotFloat {
    0% { transform: translateY(0) translateX(0); opacity: 0.7; }
    25% { transform: translateY(-25vh) translateX(8px); opacity: 0.9; }
    50% { transform: translateY(-50vh) translateX(-5px); opacity: 0.6; }
    75% { transform: translateY(-75vh) translateX(6px); opacity: 0.4; }
    100% { transform: translateY(-105vh) translateX(-3px); opacity: 0; }
  }

  .header {
    padding: 32px 24px 20px;
    text-align: center;
    position: relative;
    z-index: 10;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e8e6e3 0%, #54a0ff 50%, #ff6b6b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: neonTitleGlow 3s ease-in-out infinite;
  }
  @keyframes neonTitleGlow {
    0%, 100% { filter: brightness(1) drop-shadow(0 0 0px transparent); }
    50% { filter: brightness(1.15) drop-shadow(0 0 8px rgba(84, 160, 255, 0.3)); }
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #0a0a14;
    border: 1px solid #1e1e3a;
    cursor: pointer;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 80px rgba(84, 160, 255, 0.06);
    transition: box-shadow 0.3s;
    position: relative;
    z-index: 10;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 80px rgba(84, 160, 255, 0.12), 0 0 120px rgba(255, 107, 107, 0.06);
  }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #54a0ff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s;
    z-index: 200;
  }
  a.back:hover { opacity: 1; }
</style>
</head>
<body>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="neon-glows">
  <div class="neon-spot"></div>
  <div class="neon-spot"></div>
  <div class="neon-spot"></div>
  <div class="neon-spot"></div>
  <div class="neon-spot"></div>
</div>
<div class="neon-particles">
  <div class="neon-dot"></div>
  <div class="neon-dot"></div>
  <div class="neon-dot"></div>
  <div class="neon-dot"></div>
  <div class="neon-dot"></div>
  <div class="neon-dot"></div>
  <div class="neon-dot"></div>
  <div class="neon-dot"></div>
</div>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Pinball</h1>
  <p class="hint">A ball bounces among bumpers while text reflows around everything. Press left/right arrows for flippers. Space to launch.</p>
</div>
<canvas id="canvas"></canvas>
<script type="module" src="./pinball.ts"></script>
</body>
</html>
