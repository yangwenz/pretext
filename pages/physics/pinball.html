<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinball — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #080810;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .header {
    padding: 32px 24px 20px;
    text-align: center;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e8e6e3 0%, #54a0ff 50%, #ff6b6b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #0a0a14;
    border: 1px solid #1e1e3a;
    cursor: pointer;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 80px rgba(84, 160, 255, 0.06);
    transition: box-shadow 0.3s;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 80px rgba(84, 160, 255, 0.12);
  }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #54a0ff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  a.back:hover { opacity: 1; }
</style>
</head>
<body>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Pinball</h1>
  <p class="hint">A ball bounces among bumpers while text reflows around everything. Press left/right arrows for flippers. Space to launch.</p>
</div>
<canvas id="canvas"></canvas>
<script type="module" src="./pinball.ts"></script>
</body>
</html>
