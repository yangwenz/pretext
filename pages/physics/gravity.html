<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Drop — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Background glow from above */
  .bg-glow {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse at center, rgba(108, 138, 255, 0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Vignette overlay */
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.5) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* Falling particles */
  .particles {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .particles .dot {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(108, 138, 255, 0.4);
    border-radius: 50%;
    animation: fall linear infinite;
  }
  .particles .dot:nth-child(1) { left: 8%; animation-duration: 8s; animation-delay: 0s; opacity: 0.3; }
  .particles .dot:nth-child(2) { left: 15%; animation-duration: 11s; animation-delay: -2s; opacity: 0.5; }
  .particles .dot:nth-child(3) { left: 25%; animation-duration: 9s; animation-delay: -4s; opacity: 0.2; }
  .particles .dot:nth-child(4) { left: 35%; animation-duration: 13s; animation-delay: -1s; opacity: 0.4; }
  .particles .dot:nth-child(5) { left: 45%; animation-duration: 10s; animation-delay: -6s; opacity: 0.3; }
  .particles .dot:nth-child(6) { left: 55%; animation-duration: 12s; animation-delay: -3s; opacity: 0.5; }
  .particles .dot:nth-child(7) { left: 65%; animation-duration: 7s; animation-delay: -5s; opacity: 0.2; }
  .particles .dot:nth-child(8) { left: 75%; animation-duration: 14s; animation-delay: -7s; opacity: 0.4; }
  .particles .dot:nth-child(9) { left: 85%; animation-duration: 9s; animation-delay: -2s; opacity: 0.3; }
  .particles .dot:nth-child(10) { left: 92%; animation-duration: 11s; animation-delay: -8s; opacity: 0.5; }
  .particles .dot:nth-child(11) { left: 20%; animation-duration: 15s; animation-delay: -9s; opacity: 0.2; width: 3px; height: 3px; }
  .particles .dot:nth-child(12) { left: 70%; animation-duration: 16s; animation-delay: -4s; opacity: 0.15; width: 3px; height: 3px; }

  @keyframes fall {
    0% { transform: translateY(-20px); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
  }

  .header {
    padding: 32px 24px 20px;
    text-align: center;
    position: relative;
    z-index: 2;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(180deg, #ffffff 30%, #6c8aff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #141420;
    border: 1px solid #1e1e2e;
    cursor: pointer;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(108, 138, 255, 0.05);
    transition: box-shadow 0.3s;
    position: relative;
    z-index: 2;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 30px rgba(108, 138, 255, 0.06), 0 0 0 1px rgba(108, 138, 255, 0.12);
  }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #6c8aff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 10;
  }
  a.back:hover { opacity: 1; transform: translateX(-3px); }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="vignette"></div>
<div class="particles">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Gravity Drop</h1>
  <p class="hint">Click to release letters. Click again to reset.</p>
</div>
<canvas id="canvas"></canvas>
<script type="module" src="./gravity.ts"></script>
</body>
</html>
