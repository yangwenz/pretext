<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #080810;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(4, 4, 10, 0.85) 100%);
  }

  .machine-glow {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 140%;
    height: 140%;
    background: radial-gradient(ellipse at center, rgba(255, 170, 50, 0.04) 0%, rgba(180, 100, 20, 0.02) 30%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    animation: machineGlow 8s ease-in-out infinite;
  }
  @keyframes machineGlow {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.03); }
  }

  .sparks-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .spark-dot {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 180, 60, 0.4);
    animation: sparkFloat linear infinite;
  }
  .spark-dot:nth-child(1) { left: 15%; top: 20%; width: 2px; height: 2px; animation-duration: 4s; }
  .spark-dot:nth-child(2) { left: 70%; top: 40%; width: 3px; height: 3px; animation-duration: 5s; animation-delay: 1s; }
  .spark-dot:nth-child(3) { left: 45%; top: 60%; width: 2px; height: 2px; animation-duration: 3.5s; animation-delay: 2s; }
  .spark-dot:nth-child(4) { left: 80%; top: 25%; width: 2px; height: 2px; animation-duration: 4.5s; animation-delay: 0.5s; }
  .spark-dot:nth-child(5) { left: 30%; top: 75%; width: 3px; height: 3px; animation-duration: 6s; animation-delay: 3s; }
  .spark-dot:nth-child(6) { left: 60%; top: 85%; width: 2px; height: 2px; animation-duration: 3s; animation-delay: 1.5s; }
  @keyframes sparkFloat {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    20% { opacity: 1; transform: translateY(-10px) scale(1); }
    80% { opacity: 0.6; transform: translateY(-30px) scale(0.8); }
    100% { opacity: 0; transform: translateY(-50px) scale(0.3); }
  }

  .header {
    padding: 32px 24px 20px;
    text-align: center;
    position: relative;
    z-index: 10;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e8e6e3 0%, #ffb830 50%, #ff6b35 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #0a0c14;
    border: 1px solid #1a1a2a;
    cursor: pointer;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 80px rgba(255, 140, 30, 0.05);
    transition: box-shadow 0.3s;
    position: relative;
    z-index: 10;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 80px rgba(255, 140, 30, 0.1);
  }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #ffb830;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s;
    z-index: 200;
  }
  a.back:hover { opacity: 1; }
</style>
</head>
<body>
<div class="vignette"></div>
<div class="machine-glow"></div>
<div class="sparks-bg">
  <div class="spark-dot"></div>
  <div class="spark-dot"></div>
  <div class="spark-dot"></div>
  <div class="spark-dot"></div>
  <div class="spark-dot"></div>
  <div class="spark-dot"></div>
</div>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Machine</h1>
  <p class="hint">A Rube Goldberg machine with gears, pendulums, and conveyor belts. Text reflows around the moving parts. Click to drop a ball.</p>
</div>
<canvas id="canvas"></canvas>
<script type="module" src="./machine.ts"></script>
</body>
</html>
