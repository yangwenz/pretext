<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Cradle — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Warm ambient glow from center */
  .bg-effects {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-effects::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 500px;
    background: radial-gradient(ellipse at center, rgba(245, 230, 211, 0.05) 0%, rgba(108, 138, 255, 0.03) 40%, transparent 70%);
  }

  /* Ruled paper lines */
  .ruled-lines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 39px,
      rgba(245, 230, 211, 0.03) 39px,
      rgba(245, 230, 211, 0.03) 40px
    );
    background-size: 100% 40px;
    background-position: 0 20px;
  }

  /* Floating page/leaf shapes */
  .leaf {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    animation: leaf-fall 12s ease-in-out infinite;
  }
  .leaf::before {
    content: '';
    display: block;
    width: 16px;
    height: 20px;
    border-radius: 2px;
    border: 1px solid rgba(245, 230, 211, 0.15);
    background: rgba(245, 230, 211, 0.03);
    transform: rotate(var(--rot));
  }
  .leaf:nth-child(1) { left: 15%; top: -5%; --rot: 12deg; animation-delay: 0s; animation-duration: 14s; }
  .leaf:nth-child(2) { left: 45%; top: -5%; --rot: -8deg; animation-delay: 3s; animation-duration: 11s; }
  .leaf:nth-child(3) { left: 70%; top: -5%; --rot: 20deg; animation-delay: 6s; animation-duration: 13s; }
  .leaf:nth-child(4) { left: 30%; top: -5%; --rot: -15deg; animation-delay: 9s; animation-duration: 15s; }
  .leaf:nth-child(5) { left: 80%; top: -5%; --rot: 5deg; animation-delay: 2s; animation-duration: 12s; }

  @keyframes leaf-fall {
    0% { opacity: 0; transform: translateY(0) rotate(0deg); }
    10% { opacity: 0.5; }
    90% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
  }

  /* Vignette */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(5, 5, 10, 0.7) 100%);
  }

  .header {
    padding: 32px 24px 20px;
    text-align: center;
    position: relative;
    z-index: 2;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #f5e6d3 0%, #d4c4b0 40%, #6c8aff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #141420;
    border: 1px solid #1e1e2e;
    cursor: grab;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(108, 138, 255, 0.05);
    transition: box-shadow 0.3s;
    position: relative;
    z-index: 2;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(108, 138, 255, 0.1);
  }
  canvas:active { cursor: grabbing; }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #6c8aff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s;
    z-index: 10;
  }
  a.back:hover { opacity: 1; }
</style>
</head>
<body>
<div class="bg-effects"></div>
<div class="ruled-lines"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="vignette"></div>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Document Cradle</h1>
  <p class="hint">A Newton's Cradle embedded in a flowing pretext document. Drag a ball to swing it.</p>
</div>
<canvas id="canvas"></canvas>
<script type="module" src="./document.ts"></script>
</body>
</html>
