<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Golden star glow from center */
  .bg-effects {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-effects::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255, 215, 0, 0.07) 0%, rgba(255, 180, 0, 0.03) 30%, rgba(108, 138, 255, 0.02) 60%, transparent 80%);
    border-radius: 50%;
  }

  /* Concentric orbit rings */
  .orbit-rings {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }
  .orbit-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    border-radius: 50%;
    border: 1px dashed rgba(108, 138, 255, 0.06);
    animation: orbit-rotate 60s linear infinite;
  }
  .orbit-ring:nth-child(1) {
    width: 200px;
    height: 200px;
    margin: -100px 0 0 -100px;
    animation-duration: 40s;
  }
  .orbit-ring:nth-child(2) {
    width: 350px;
    height: 350px;
    margin: -175px 0 0 -175px;
    animation-duration: 55s;
    border-color: rgba(255, 215, 0, 0.04);
  }
  .orbit-ring:nth-child(3) {
    width: 520px;
    height: 520px;
    margin: -260px 0 0 -260px;
    animation-duration: 70s;
  }
  .orbit-ring:nth-child(4) {
    width: 700px;
    height: 700px;
    margin: -350px 0 0 -350px;
    animation-duration: 90s;
    border-color: rgba(108, 138, 255, 0.04);
  }

  @keyframes orbit-rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Vignette */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(5, 5, 10, 0.8) 100%);
  }

  /* Twinkling star particles */
  .star {
    position: fixed;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    background: #fff;
    opacity: 0;
    animation: twinkle 3s ease-in-out infinite;
  }
  .star:nth-child(1) { top: 10%; left: 15%; animation-delay: 0s; animation-duration: 2.5s; }
  .star:nth-child(2) { top: 20%; left: 80%; animation-delay: 0.5s; animation-duration: 3.2s; }
  .star:nth-child(3) { top: 40%; left: 8%; animation-delay: 1.0s; animation-duration: 2.8s; }
  .star:nth-child(4) { top: 55%; left: 92%; animation-delay: 1.5s; animation-duration: 3.5s; }
  .star:nth-child(5) { top: 70%; left: 25%; animation-delay: 2.0s; animation-duration: 2.2s; }
  .star:nth-child(6) { top: 85%; left: 70%; animation-delay: 2.5s; animation-duration: 3.0s; }
  .star:nth-child(7) { top: 30%; left: 50%; animation-delay: 0.3s; animation-duration: 4.0s; }
  .star:nth-child(8) { top: 65%; left: 45%; animation-delay: 1.8s; animation-duration: 2.6s; }
  .star:nth-child(9) { top: 15%; left: 60%; animation-delay: 3.0s; animation-duration: 3.8s; }
  .star:nth-child(10) { top: 90%; left: 40%; animation-delay: 0.7s; animation-duration: 2.9s; }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 0.8; transform: scale(1.5); }
  }

  .header {
    padding: 32px 24px 20px;
    text-align: center;
    position: relative;
    z-index: 2;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #ffd700 0%, #ffaa00 30%, #6c8aff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #080810;
    border: 1px solid #1e1e2e;
    cursor: crosshair;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(108, 138, 255, 0.05);
    transition: box-shadow 0.3s;
    position: relative;
    z-index: 2;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(108, 138, 255, 0.1);
  }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #6c8aff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s;
    z-index: 10;
  }
  a.back:hover { opacity: 1; }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    position: relative;
    z-index: 2;
  }
  button {
    padding: 8px 18px;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    background: #141420;
    color: #e8e6e3;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  button:hover {
    border-color: #6c8aff;
    transform: translateY(-1px);
  }
</style>
</head>
<body>
<div class="bg-effects"></div>
<div class="orbit-rings">
  <div class="orbit-ring"></div>
  <div class="orbit-ring"></div>
  <div class="orbit-ring"></div>
  <div class="orbit-ring"></div>
</div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="vignette"></div>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Orbital Text</h1>
  <p class="hint">Words orbit a central attractor. Click and hold to add gravitational pull at cursor.</p>
</div>
<canvas id="canvas"></canvas>
<div class="controls">
  <button id="btn-add">Add Word</button>
  <button id="btn-burst">Burst</button>
  <button id="btn-reverse">Reverse</button>
</div>
<script type="module" src="./orbit.ts"></script>
</body>
</html>
