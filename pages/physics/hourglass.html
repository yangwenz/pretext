<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hourglass — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #0a0808;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Vignette overlay */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(10, 8, 8, 0.8) 100%);
  }

  /* Warm amber glow pulsing */
  .amber-glow {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at center, rgba(196, 127, 23, 0.06) 0%, rgba(240, 194, 127, 0.03) 30%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    animation: amberPulse 5s ease-in-out infinite;
  }
  @keyframes amberPulse {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.03); }
  }

  /* Clock-like radial lines */
  .clock-lines {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.04;
    animation: clockSpin 120s linear infinite;
  }
  .clock-lines::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-conic-gradient(from 0deg, rgba(240, 194, 127, 0.8) 0deg, transparent 1deg, transparent 30deg);
    border-radius: 50%;
  }
  @keyframes clockSpin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* Falling sand grain particles */
  .sand-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .sand-grain {
    position: absolute;
    top: -5px;
    width: 2px;
    height: 2px;
    background: rgba(240, 194, 127, 0.4);
    border-radius: 50%;
    animation: sandFall linear infinite;
  }
  .sand-grain:nth-child(1) { left: 8%; animation-duration: 8s; animation-delay: 0s; }
  .sand-grain:nth-child(2) { left: 15%; animation-duration: 10s; animation-delay: 1.5s; width: 1.5px; height: 1.5px; }
  .sand-grain:nth-child(3) { left: 22%; animation-duration: 9s; animation-delay: 3s; }
  .sand-grain:nth-child(4) { left: 78%; animation-duration: 11s; animation-delay: 0.5s; width: 2.5px; height: 2.5px; }
  .sand-grain:nth-child(5) { left: 85%; animation-duration: 7s; animation-delay: 2s; }
  .sand-grain:nth-child(6) { left: 92%; animation-duration: 12s; animation-delay: 4s; width: 1.5px; height: 1.5px; }
  .sand-grain:nth-child(7) { left: 5%; animation-duration: 9s; animation-delay: 5s; }
  .sand-grain:nth-child(8) { left: 95%; animation-duration: 10s; animation-delay: 1s; }
  .sand-grain:nth-child(9) { left: 12%; animation-duration: 13s; animation-delay: 6s; width: 1px; height: 1px; }
  .sand-grain:nth-child(10) { left: 88%; animation-duration: 8s; animation-delay: 3.5s; }
  @keyframes sandFall {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    5% { opacity: 0.5; }
    50% { transform: translateY(50vh) translateX(3px); opacity: 0.4; }
    95% { opacity: 0.2; }
    100% { transform: translateY(105vh) translateX(-2px); opacity: 0; }
  }

  /* Warm ambient particles (larger, slower, like dust in sunlight) */
  .dust-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .dust-mote {
    position: absolute;
    width: 3px;
    height: 3px;
    background: rgba(196, 127, 23, 0.15);
    border-radius: 50%;
    animation: dustFloat ease-in-out infinite;
  }
  .dust-mote:nth-child(1) { top: 30%; left: 20%; animation-duration: 12s; }
  .dust-mote:nth-child(2) { top: 60%; left: 70%; animation-duration: 15s; animation-delay: 2s; width: 4px; height: 4px; }
  .dust-mote:nth-child(3) { top: 45%; left: 40%; animation-duration: 10s; animation-delay: 1s; }
  .dust-mote:nth-child(4) { top: 70%; left: 85%; animation-duration: 14s; animation-delay: 3s; width: 2px; height: 2px; }
  .dust-mote:nth-child(5) { top: 20%; left: 60%; animation-duration: 11s; animation-delay: 4s; }
  @keyframes dustFloat {
    0%, 100% { transform: translate(0, 0); opacity: 0.3; }
    25% { transform: translate(10px, -8px); opacity: 0.5; }
    50% { transform: translate(-5px, 5px); opacity: 0.4; }
    75% { transform: translate(8px, -3px); opacity: 0.3; }
  }

  .header {
    padding: 32px 24px 20px;
    text-align: center;
    position: relative;
    z-index: 10;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e8e6e3 0%, #f0c27f 50%, #c47f17 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #0d0a08;
    border: 1px solid #2a1f14;
    cursor: pointer;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 80px rgba(196, 127, 23, 0.08);
    transition: box-shadow 0.3s;
    position: relative;
    z-index: 10;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 80px rgba(196, 127, 23, 0.15);
  }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #f0c27f;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s;
    z-index: 200;
  }
  a.back:hover { opacity: 1; }
</style>
</head>
<body>
<div class="vignette"></div>
<div class="amber-glow"></div>
<div class="clock-lines"></div>
<div class="sand-container">
  <div class="sand-grain"></div>
  <div class="sand-grain"></div>
  <div class="sand-grain"></div>
  <div class="sand-grain"></div>
  <div class="sand-grain"></div>
  <div class="sand-grain"></div>
  <div class="sand-grain"></div>
  <div class="sand-grain"></div>
  <div class="sand-grain"></div>
  <div class="sand-grain"></div>
</div>
<div class="dust-container">
  <div class="dust-mote"></div>
  <div class="dust-mote"></div>
  <div class="dust-mote"></div>
  <div class="dust-mote"></div>
  <div class="dust-mote"></div>
</div>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Hourglass</h1>
  <p class="hint">Text grains fall like sand through the neck. Click to flip the hourglass.</p>
</div>
<canvas id="canvas"></canvas>
<script type="module" src="./hourglass.ts"></script>
</body>
</html>
