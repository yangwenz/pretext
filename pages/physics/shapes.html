<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Shapes — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Vignette overlay */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
  }

  /* Multi-color gentle glow */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 40% 40% at 20% 50%, rgba(99,132,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 50%, rgba(168,85,247,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 30% at 50% 80%, rgba(52,211,153,0.05) 0%, transparent 60%);
  }

  /* Subtle geometric grid */
  .bg-grid {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.03;
    background-image:
      linear-gradient(rgba(99,132,255,0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,132,255,0.5) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Floating geometric shapes */
  .geo-shapes {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .geo {
    position: absolute;
    animation: geo-drift linear infinite;
    opacity: 0.08;
  }
  /* Triangle */
  .geo:nth-child(1) {
    left: 10%;
    top: 20%;
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-bottom: 35px solid #6384ff;
    animation-duration: 25s;
    animation-delay: 0s;
  }
  /* Circle */
  .geo:nth-child(2) {
    left: 75%;
    top: 30%;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #a855f7;
    animation-duration: 30s;
    animation-delay: -8s;
  }
  /* Square */
  .geo:nth-child(3) {
    left: 50%;
    top: 65%;
    width: 30px;
    height: 30px;
    border: 2px solid #34d399;
    animation-duration: 22s;
    animation-delay: -4s;
  }
  /* Small triangle */
  .geo:nth-child(4) {
    left: 85%;
    top: 70%;
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 21px solid #a855f7;
    animation-duration: 28s;
    animation-delay: -12s;
  }
  /* Small circle */
  .geo:nth-child(5) {
    left: 25%;
    top: 50%;
    width: 25px;
    height: 25px;
    border-radius: 50%;
    border: 2px solid #6384ff;
    animation-duration: 20s;
    animation-delay: -6s;
  }
  /* Diamond (rotated square) */
  .geo:nth-child(6) {
    left: 60%;
    top: 15%;
    width: 22px;
    height: 22px;
    border: 2px solid #34d399;
    transform: rotate(45deg);
    animation-duration: 26s;
    animation-delay: -15s;
  }

  @keyframes geo-drift {
    0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.08; }
    50% { transform: translate(20px, -30px) rotate(180deg); }
    90% { opacity: 0.08; }
    100% { transform: translate(-15px, -60px) rotate(360deg); opacity: 0; }
  }
  /* Override for diamond to preserve its base rotation */
  .geo:nth-child(6) {
    animation-name: geo-drift-diamond;
  }
  @keyframes geo-drift-diamond {
    0% { transform: rotate(45deg) translate(0, 0); opacity: 0; }
    10% { opacity: 0.08; }
    50% { transform: rotate(225deg) translate(20px, -30px); }
    90% { opacity: 0.08; }
    100% { transform: rotate(405deg) translate(-15px, -60px); opacity: 0; }
  }

  .header {
    padding: 32px 24px 20px;
    text-align: center;
    position: relative;
    z-index: 2;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #6384ff, #34d399, #a855f7, #6384ff);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradient-shift 8s ease infinite;
  }
  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #141420;
    border: 1px solid rgba(99,132,255,0.1);
    cursor: grab;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 30px rgba(99,132,255,0.03), 0 0 60px rgba(168,85,247,0.02);
    transition: box-shadow 0.3s;
    position: relative;
    z-index: 2;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(99,132,255,0.05), 0 0 80px rgba(168,85,247,0.03);
  }
  canvas:active { cursor: grabbing; }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #a78bfa;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s, transform 0.2s, letter-spacing 0.2s;
    z-index: 20;
  }
  a.back:hover {
    opacity: 1;
    transform: translateX(-3px);
    letter-spacing: 0.02em;
  }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    position: relative;
    z-index: 2;
  }
  button {
    padding: 8px 18px;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    background: #141420;
    color: #e8e6e3;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  button:hover {
    border-color: #a78bfa;
    transform: translateY(-1px);
  }
</style>
</head>
<body>
<div class="vignette"></div>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div class="geo-shapes">
  <div class="geo"></div>
  <div class="geo"></div>
  <div class="geo"></div>
  <div class="geo"></div>
  <div class="geo"></div>
  <div class="geo"></div>
</div>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Character Shapes</h1>
  <p class="hint">Characters form rigid shapes — circles, boxes, triangles — that collide and stack. Drag to throw them around.</p>
</div>
<canvas id="canvas"></canvas>
<div class="controls">
  <button id="btn-circle">Drop Circle</button>
  <button id="btn-box">Drop Box</button>
  <button id="btn-triangle">Drop Triangle</button>
  <button id="btn-reset">Reset</button>
</div>
<script type="module" src="./shapes.ts"></script>
</body>
</html>
