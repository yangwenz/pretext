<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Hole — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #020204;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .header {
    padding: 32px 24px 20px;
    text-align: center;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e8e6e3 0%, #ff8c00 50%, #000 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #020206;
    border: 1px solid #1a1520;
    cursor: pointer;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 80px rgba(255, 140, 0, 0.05);
    transition: box-shadow 0.3s;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 80px rgba(255, 140, 0, 0.1);
  }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #ff8c00;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  a.back:hover { opacity: 1; }
</style>
</head>
<body>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Black Hole</h1>
  <p class="hint">A singularity devours the text. Characters near the event horizon orbit and stretch. Click to move the black hole.</p>
</div>
<canvas id="canvas"></canvas>
<script type="module" src="./blackhole.ts"></script>
</body>
</html>
