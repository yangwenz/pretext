<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Hole — Physics Text</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    background: #020204;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  .header {
    padding: 32px 24px 20px;
    text-align: center;
    position: relative;
    z-index: 2;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e8e6e3 0%, #ff8c00 50%, #000 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hint {
    color: #8a8690;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0.9;
  }
  canvas {
    display: block;
    border-radius: 16px;
    background: #020206;
    border: 1px solid #1a1520;
    cursor: pointer;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 80px rgba(255, 140, 0, 0.05);
    transition: box-shadow 0.3s;
    position: relative;
    z-index: 2;
  }
  canvas:hover {
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 80px rgba(255, 140, 0, 0.1);
  }
  a.back {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #ff8c00;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.2s;
    z-index: 10;
  }
  a.back:hover { opacity: 1; }

  /* Deep space vignette */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.7) 70%, rgba(0,0,0,0.95) 100%);
  }

  /* Central radial glow */
  .bg-glow {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 600px;
    height: 600px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,140,0,0.06) 0%, rgba(255,80,0,0.03) 40%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Rotating accretion disk */
  .accretion-disk {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 400px;
    height: 400px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(255,140,0,0.08);
    box-shadow: 0 0 40px rgba(255,140,0,0.04), inset 0 0 40px rgba(255,140,0,0.02);
    animation: rotate-disk 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  .accretion-disk::before {
    content: '';
    position: absolute;
    inset: 30px;
    border-radius: 50%;
    border: 1px solid rgba(255,100,0,0.06);
    box-shadow: 0 0 20px rgba(255,100,0,0.03);
  }
  .accretion-disk::after {
    content: '';
    position: absolute;
    inset: 60px;
    border-radius: 50%;
    border: 1px solid rgba(255,60,0,0.04);
  }
  @keyframes rotate-disk {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* Pulsing concentric rings */
  .ring-pulse {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 200px;
    height: 200px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(255,140,0,0.1);
    animation: pulse-outward 4s ease-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  .ring-pulse:nth-child(2) { animation-delay: 1.3s; }
  .ring-pulse:nth-child(3) { animation-delay: 2.6s; }
  @keyframes pulse-outward {
    0% { width: 100px; height: 100px; opacity: 0.3; border-color: rgba(255,140,0,0.15); }
    100% { width: 600px; height: 600px; opacity: 0; border-color: rgba(255,80,0,0); }
  }

  /* Star particles pulled inward */
  .star-particle {
    position: fixed;
    width: 2px;
    height: 2px;
    background: #ff8c00;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    animation: pull-inward 6s ease-in infinite;
  }
  .star-particle:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
  .star-particle:nth-child(2) { top: 15%; left: 75%; animation-delay: 0.8s; }
  .star-particle:nth-child(3) { top: 30%; left: 10%; animation-delay: 1.6s; }
  .star-particle:nth-child(4) { top: 70%; left: 85%; animation-delay: 2.4s; }
  .star-particle:nth-child(5) { top: 80%; left: 15%; animation-delay: 3.2s; }
  .star-particle:nth-child(6) { top: 85%; left: 70%; animation-delay: 4s; }
  .star-particle:nth-child(7) { top: 20%; left: 60%; animation-delay: 4.8s; }
  .star-particle:nth-child(8) { top: 60%; left: 25%; animation-delay: 5.5s; }
  @keyframes pull-inward {
    0% { opacity: 0.8; transform: translate(0, 0) scale(1); }
    80% { opacity: 0.4; }
    100% { opacity: 0; transform: translate(calc(50vw - 100%), calc(50vh - 100%)) scale(0); }
  }

  /* Tiny background stars */
  .bg-stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(1px 1px at 15% 25%, rgba(255,200,150,0.3), transparent),
      radial-gradient(1px 1px at 40% 60%, rgba(255,200,150,0.2), transparent),
      radial-gradient(1px 1px at 70% 20%, rgba(255,200,150,0.25), transparent),
      radial-gradient(1px 1px at 85% 70%, rgba(255,200,150,0.2), transparent),
      radial-gradient(1px 1px at 25% 80%, rgba(255,200,150,0.15), transparent),
      radial-gradient(1px 1px at 55% 40%, rgba(255,200,150,0.2), transparent),
      radial-gradient(1px 1px at 90% 35%, rgba(255,200,150,0.15), transparent),
      radial-gradient(1px 1px at 10% 55%, rgba(255,200,150,0.2), transparent),
      radial-gradient(1px 1px at 60% 85%, rgba(255,200,150,0.15), transparent),
      radial-gradient(1px 1px at 35% 10%, rgba(255,200,150,0.2), transparent);
  }
</style>
</head>
<body>
<div class="bg-stars"></div>
<div class="bg-glow"></div>
<div class="accretion-disk"></div>
<div class="ring-pulse"></div>
<div class="ring-pulse"></div>
<div class="ring-pulse"></div>
<div class="star-particle"></div>
<div class="star-particle"></div>
<div class="star-particle"></div>
<div class="star-particle"></div>
<div class="star-particle"></div>
<div class="star-particle"></div>
<div class="star-particle"></div>
<div class="star-particle"></div>
<div class="vignette"></div>
<a class="back" href="/physics">&larr; All demos</a>
<div class="header">
  <h1>Black Hole</h1>
  <p class="hint">A singularity devours the text. Characters near the event horizon orbit and stretch. Click to move the black hole.</p>
</div>
<canvas id="canvas"></canvas>
<script type="module" src="./blackhole.ts"></script>
</body>
</html>
